version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: hcl_m3_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hcl_module3
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    container_name: hcl_m3_coturn
    ports:
      - "3478:3478/tcp"
    volumes:
      - ./coturn.conf:/etc/coturn/turnserver.conf
    command: -c /etc/coturn/turnserver.conf

  livekit:
    image: livekit/livekit-server:latest
    container_name: hcl_m3_livekit
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "exec /livekit-server --dev --bind 0.0.0.0 --node-ip=$$(hostname -i | awk '{print $$1}')"
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    depends_on:
      - coturn

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hcl_m3_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/hcl_module3
      LIVEKIT_API_URL: http://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LIVEKIT_PUBLIC_WS_URL: ws://localhost:7880
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hcl_m3_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
