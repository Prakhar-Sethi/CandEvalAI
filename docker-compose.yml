version: "3.9"

services:
  # ─────────────────────────────────────────
  # Shared PostgreSQL 16
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hcl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hcl_user
      POSTGRES_PASSWORD: hcl_pass
      POSTGRES_DB: hcl_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hcl_user -d hcl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Module 2 — Written Test
  # ─────────────────────────────────────────
  module2-backend:
    build:
      context: ./module2/backend
      dockerfile: Dockerfile
    container_name: hcl_module2_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://hcl_user:hcl_pass@postgres:5432/hcl_db
      MODEL_CACHE_DIR: /app/model_cache
    volumes:
      - model_cache:/app/model_cache
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  module2-frontend:
    build:
      context: ./module2/frontend
      dockerfile: Dockerfile
    container_name: hcl_module2_frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - module2-backend

  # ─────────────────────────────────────────
  # Module 4 — Coding Test
  # ─────────────────────────────────────────
  module4-backend:
    build:
      context: ./module4/backend
      dockerfile: Dockerfile
    container_name: hcl_module4_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://hcl_user:hcl_pass@postgres:5432/hcl_db
      JUDGE0_URL: http://judge0:2358
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      judge0:
        condition: service_healthy

  module4-frontend:
    build:
      context: ./module4/frontend
      dockerfile: Dockerfile
    container_name: hcl_module4_frontend
    restart: unless-stopped
    ports:
      - "3004:80"
    depends_on:
      - module4-backend

  # ─────────────────────────────────────────
  # Judge0 CE (self-hosted code execution)
  # Run: docker-compose -f module4/judge0/docker-compose.judge0.yml up -d FIRST
  # Then run this docker-compose.yml
  # OR use the external_links approach below.
  # ─────────────────────────────────────────
  # ─────────────────────────────────────────
  # Module 3 — Technical Interview
  # ─────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    container_name: hcl_m3_coturn
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
    volumes:
      - ./module3/coturn.conf:/etc/coturn/turnserver.conf
    command: -c /etc/coturn/turnserver.conf

  livekit:
    image: livekit/livekit-server:latest
    container_name: hcl_m3_livekit
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "exec /livekit-server --dev --bind 0.0.0.0 --node-ip=$$(hostname -i | awk '{print $$1}')"
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    depends_on:
      - coturn

  module3-backend:
    build:
      context: ./module3/backend
      dockerfile: Dockerfile
    container_name: hcl_m3_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://hcl_user:hcl_pass@postgres:5432/hcl_db
      LIVEKIT_API_URL: http://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LIVEKIT_PUBLIC_WS_URL: ws://localhost:7880
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:3003","http://localhost:5173"]'
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started

  module3-frontend:
    build:
      context: ./module3/frontend
      dockerfile: Dockerfile
    container_name: hcl_m3_frontend
    restart: unless-stopped
    ports:
      - "3003:5173"
    depends_on:
      - module3-backend

  judge0:
    image: judge0/judge0:1.13.1
    container_name: hcl_judge0
    restart: unless-stopped
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    depends_on:
      - judge0-redis
      - judge0-postgres

  judge0-worker:
    image: judge0/judge0:1.13.1
    container_name: hcl_judge0_worker
    restart: unless-stopped
    command: ["./scripts/workers"]
    environment:
      INTERVAL: "1"
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    depends_on:
      - judge0-redis
      - judge0-postgres

  judge0-redis:
    image: redis:7-alpine
    container_name: hcl_judge0_redis
    restart: unless-stopped

  judge0-postgres:
    image: postgres:14-alpine
    container_name: hcl_judge0_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0pass
      POSTGRES_DB: judge0
    volumes:
      - judge0_db:/var/lib/postgresql/data

volumes:
  postgres_data:
  model_cache:
  judge0_db:
