################################################################################
# Judge0 CE Configuration
################################################################################

# Redis
REDIS_HOST=judge0-redis
REDIS_PORT=6379

# PostgreSQL
POSTGRES_HOST=judge0-postgres
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0pass

# Server
ENABLE_WAIT_RESULT=true
ALLOW_ENABLE_WAIT_RESULT=true
MAX_QUEUE_SIZE=100
SUBMISSION_CACHE_DURATION=0

# Worker polling interval (seconds) — keep low to avoid queue delays
INTERVAL=1

# Disable isolate sandbox (needed when cgroup memory controller is unavailable)
DISABLE_ISOLATE=true
